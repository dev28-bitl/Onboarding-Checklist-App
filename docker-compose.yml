services:
  postgres:
    image: postgres:16
    container_name: onboarding-postgres
    environment:
      POSTGRES_DB: onboarding
      POSTGRES_USER: onboarding
      POSTGRES_PASSWORD: onboarding
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./onboarding-backend
    container_name: onboarding-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://onboarding:onboarding@postgres:5432/onboarding
      SECRET_KEY: local-dev-secret
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./onboarding-frontend
    container_name: onboarding-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
